<!DOCTYPE html>
<html lang="de">
<head>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/app.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Camera Tethering</title>
</head>
<body class="py-2 py-md-4">
<div class="container-xl px-2 px-md-3">
    <div class="alert-container">
        <div class="alert hide" role="alert" id="alert">

        </div>
    </div>
    <div class="accordion " id="accordion">
        <div class="accordion-item">
            <h2 class="accordion-header" id="flush-headingOne">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseOne" aria-expanded="false" aria-controls="flush-collapseOne">
                    Connection to Camera
                </button>
            </h2>
            <div id="flush-collapseOne" class="accordion-collapse collapse show" aria-labelledby="flush-headingOne">
                <div class="accordion-body">
                    <div class="row d-flex align-items-end mb-2">
                        <div class="col">
                            <button class="btn btn-danger btn-sm" id="shutdown" style="float: right;">Shutdown Pi</button>
                        </div>
                    </div>
                    <div class="row g-2 align-items-center">
                        <div class="col-6 col-md-3">
                            <label class="fw-semibold">Connection Status:</label><br>
                            <span id="cameraStatus">Disconnected</span>
                        </div>
                        <div class="col-6 col-md-3">
                            <select class="form-select form-select-sm" aria-label="Camera Select" id="availableCameras">
                                <option selected>No cameras available</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-3 d-flex gap-2">
                            <button class="btn btn-primary btn-sm" id="connect">Connect</button>
                            <button class="btn btn-primary btn-sm hide" id="disconnect">Disconnect</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="accordion-item">
            <h2 class="accordion-header" id="flush-headingTwo">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseTwo" aria-expanded="false" aria-controls="flush-collapseTwo">
                    Image
                </button>
            </h2>
            <div id="flush-collapseTwo" class="accordion-collapse collapse show" aria-labelledby="flush-headingTwo">
                <div class="accordion-body">
                    <div id="preview-control" class="mb-2">
                        <button class="btn btn-sm btn-primary" id="startPreview">Start Preview</button>
                        <button class="btn btn-sm btn-primary hide" id="stopPreview">Stop Preview</button>
                    </div>
                    <div id="image-viewer">
                        <div id="image-nav" class="d-flex align-items-center justify-content-between mb-1">
                            <button class="btn btn-sm btn-outline-secondary" id="imagePrev" disabled>&lsaquo;</button>
                            <span id="imageSource" class="text-muted small"></span>
                            <button class="btn btn-sm btn-outline-secondary" id="imageNext" disabled>&rsaquo;</button>
                        </div>
                        <img id="image" class="img-fluid" src="" alt="">
                    </div>
                </div>
            </div>
        </div>
        <div class="accordion-item">
            <h2 class="accordion-header" id="flush-headingThree">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseThree" aria-expanded="false" aria-controls="flush-collapseThree">
                    Camera Settings
                </button>
            </h2>
            <div id="flush-collapseThree" class="accordion-collapse collapse show" aria-labelledby="flush-headingThree">
                <div class="accordion-body">
                    <div class="col" id="cameraSettings">

                    </div>
                </div>
            </div>
        </div>
        <div class="accordion-item">
            <h2 class="accordion-header" id="flush-headingFour">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseFour" aria-expanded="false" aria-controls="flush-collapseFour">
                    Capture
                </button>
            </h2>
            <div id="flush-collapseFour" class="accordion-collapse collapse show" aria-labelledby="flush-headingFour">
                <div class="accordion-body">
                    <div class="form-check mb-3">
                        <label for="capture_interval" class="form-check-label">Interval Capture</label>
                        <input type="checkbox" class="form-check-input" id="capture_interval">
                    </div>
                    <div class="card mb-3 hide" id="capture_interval_settings">
                        <div class="card-header">
                            Interval Settings
                        </div>
                        <div class="card-body">
                            <div class="mb-2">
                                <label class="form-label">Number of Shots</label>
                                <input type="number" min="1" value="2" class="form-control" aria-label="Number of Shots" id="capture_number_of_shots"/>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Interval between shots (in seconds)</label>
                                <input type="number" min="0,1" value="1" class="form-control" aria-label="Interval Time" id="capture_interval_time"/>
                            </div>
                        </div>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">ISO</label>
                        <select class="form-select" aria-label="ISO" id="capture_iso" data-setting-name="main.imgsettings.iso"></select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Shutter Speed</label>
                        <select class="form-select" aria-label="Shutter Speed" id="capture_shutter_speed" data-setting-name="main.capturesettings.shutterspeed"></select>
                    </div>
                    <div class="mb-2 hide" id="bulb_exposure_time_container">
                        <label class="form-label">Bulb Exposure Time in seconds</label>
                        <input type="number" min="0,5" class="form-control" aria-label="Exposure Time in seconds" id="capture_bulb_exposure_time" />
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Aperture</label>
                        <select class="form-select" aria-label="Aperture" id="capture_aperture" data-setting-name="main.capturesettings.f-number"></select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Focus Mode</label>
                        <select class="form-select" aria-label="Focus Mode" id="capture_focus_mode" data-setting-name="main.capturesettings.focusmode"></select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Exposure Compensation</label>
                        <select class="form-select" aria-label="Exposure Compensation" id="capture_exposure_compensation" data-setting-name="main.capturesettings.exposurecompensation"></select>
                    </div>
                    <button class="btn btn-primary" id="capture">Capture</button>
                    <button class="btn btn-danger hide" id="cancel_capture" style="float: right;">Cancel Captures</button>
                </div>
            </div>
        </div>
        <div class="accordion-item">
            <h2 class="accordion-header" id="flush-headingFive">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseFive" aria-expanded="false" aria-controls="flush-collapseFive">
                    Post-Processing
                </button>
            </h2>
            <div id="flush-collapseFive" class="accordion-collapse collapse show" aria-labelledby="flush-headingFive">
                <div class="accordion-body">
                    <div id="post_processing_configs">
                        <!-- Post Processing Configs will be added here -->
                    </div>
                    <button class="btn btn-sm btn-secondary mb-3" id="add_post_processing_config">Add Config</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/bundle.js"></script>
</body>
</html>
